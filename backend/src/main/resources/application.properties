# Server configuration
server.port=8080

# Spring Data Source (Supabase PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Spring Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Logging configuration
logging.level.org.springframework.web=INFO
logging.level.com.merge.backend=DEBUG

# Custom application properties
jwt.secret=${JWT_SECRET:default_super_secret_key_that_is_at_least_256_bits_long}
jwt.expiration=86400000 # 24 hours
gemini.api.key=${GEMINI_API_KEY:}
encryption.key=${ENCRYPTION_KEY:default_aes_key}
